<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nykaa Fashion Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Navbar -->
<header>
    <div class="logo">NYKAA <span>Fashion</span></div>
    <nav>
        <a href="women.html">Women</a>
        <a href="men.html">Men</a>
        <a href="Makeup.HTML">Makeup</a>
        
    </nav>
    <div class="icons">
        <input type="text" placeholder="Search">
        <button><a href="login.html">Login</a></button>
        </div>
    <div class="bag">
    <a href="bag.html">🛍️ Bag (<span id="bag-count">0</span></a>)
</div>
</header>

<!-- Banner -->
<section class="banner">
    <h1>Big Fashion Sale</h1>
    <p>Up to 50% Off on Top Brands</p>
    <button>Shop Now</button>
</section>

<!-- Categories -->
<section class="categories">
    <h2>Shop by Category</h2>
    <div class="category-container">
        <div class="category"><a href="women.html">Women</a></div>
        <div class="category"><a href="men.html">Men</a></div>
        <div class="category"><a href="Makeup.HTML">Makeup</a></div>
    </div>
</section>

<!-- Products -->
<section class="products">
    <h2>Trending Products</h2>
    <div class="product-container">

        <div class="product-card">
             <img  src="./image1.png" alt="Dress"/>
            <h3 class="product-name">Floral Dress</h3>
            <p class="product-price">1999</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

        <div class="product-card">
            <img src="./image2.png" alt="Kurta"/>
            <h3 class="product-name">Ethnic Kurta</h3>
            <p class="product-price">1499</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

        <div class="product-card">
            <img src="./image3.png" alt="Shoes"/>
            <h3 class="product-name">Stylish Heels</h3>
            <p class="product-price">2499</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2025 Nykaa Fashion Clone | For Educational Purpose</p>
</footer>
<script>
let bag = JSON.parse(localStorage.getItem("bagItems")) || [];
const bagCount = document.getElementById("bag-count");

// Update bag count
function updateBagCount() {
    bagCount.textContent = bag.length;
}
updateBagCount();

// Add to Bag functionality
document.querySelectorAll(".add-to-bag").forEach(button => {
    button.addEventListener("click", function () {

        const productCard = this.parentElement;

        const product = {
            name: productCard.querySelector(".product-name").innerText,
            price: productCard.querySelector(".product-price").innerText,
            image: productCard.querySelector("img").src
        };

        bag.push(product);
        localStorage.setItem("bagItems", JSON.stringify(bag));

        updateBagCount();
        alert("Item added to bag!");
    });
});
</script>
</body>
</html>
