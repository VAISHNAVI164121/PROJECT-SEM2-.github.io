<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Women Dresses | Nykaa Fashion</title>

</head>
<body>

<!-- Header -->
<header>
    <div class="logo">NYKAA <span>Fashion</span></div>
    <nav>
        <a href="index.html">Home</a>
        <a href="women.html">Women</a>
        <a href="men.html">Men</a>
        <a href="Makeup.HTML">Makeup</a>
    </nav>
    <div class="bag">
    <a href="bag.html">🛍️ Bag (<span id="bag-count">0</span>)</a>
</div>
</header>

<!-- Page Title -->
<section class="page-title">
    <h1>Women Dresses</h1>
    <p>Explore Trendy Dresses for Every Occasion</p>
</section>

<!-- Main Section -->
<section class="main-container">

   

    <!-- Products -->
    <div class="products">
        
        <div class="dress-card" data-price="high">
            <img src="https://i.pinimg.com/originals/b9/bd/4d/b9bd4dd630649b612815dd802c4c5743.jpg">
            <h3 class="product-name">Floral Dress</h3>
            <p class="product-price">2499</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

        <div class="dress-card" data-price="high">
            <img src="https://i.pinimg.com/736x/5f/63/29/5f6329de705de666efad4b2a8107bab5.jpg" alt="">
            <h3 class="product-name" >Party Wear Dress</h3>
            <p class="product-price">3199</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

        <div class="dress-card" data-price="low">
            <img src="https://i.pinimg.com/originals/04/26/6d/04266d8a36782c5f52e0fd405ec302ec.jpg" alt="">
            <h3 class="product-name">Casual Summer Dress</h3>
            <p class="product-price">1299</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

        <div class="dress-card" data-price="mid">
            <img src="https://assets.myntassets.com/h_200,w_200,c_fill,g_auto/h_1440,q_100,w_1080/v1/assets/images/29888791/2024/6/4/5f1ed417-dbd4-4153-8a56-25ce205d547a1717467220380bebeSheathDress1.jpg" alt="">
            <h3 class="product-name">Bodycon Dress</h3>
            <p class="product-price">1999</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

        <div class="dress-card" data-price="high">
            <img src="https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/2/a/2a4eb81RDRS20B_1.jpg?rnd=20200526195200&tr=w-256" alt="">
            <h3 class="product-name">Wrap Dress</h3>
            <p class="product-price">2199</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

        <div class="dress-card" data-price="mid">
            <img src="https://adn-static1.nykaa.com/nykdesignstudio-images/pub/media/catalog/product/a/4/a4102dbWMN131771072513Blue_1.jpg?rnd=20200526195200&tr=w-512" alt="">
            <h3 class="product-name">Mini Dress</h3>
            <p class="product-price">1799</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

    </div>
</section>

<!-- Footer -->
<footer>
    <p> &copy; 2025 Nykaa Fashion Clone | Dresses Category</p>
</footer>

<script>

// Load existing bag items
let bag = JSON.parse(localStorage.getItem("bagItems")) || [];

const bagCount = document.getElementById("bag-count");

// Update bag count
function updateBagCount() {
    bagCount.textContent = bag.length;
}

updateBagCount();
// Add to Bag buttons
const buttons = document.querySelectorAll(".add-to-bag");

buttons.forEach(button => {

    button.addEventListener("click", function() {

        const products = this.parentElement;

        const product = {
            name: products.querySelector(".product-name").innerText,
            price: products.querySelector(".product-price").innerText,
            image: products.querySelector("img").src
        };

        bag.push(product);
        localStorage.setItem("bagItems", JSON.stringify(bag));

        updateBagCount();

        alert("Item added to bag!");
    });

});

</script>

</body>
</html>
