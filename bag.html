<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Bag</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }
         body {
            padding: 30px;
        }

        h1 {
            margin-bottom: 20px;
        }

        #bag-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .bag-card {
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
        }

        .bag-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .remove-btn {
            margin-top: 10px;
            padding: 8px 12px;
            border: none;
            background-color: crimson;
            color: white;
            cursor: pointer;
        }
        .total {
            margin-top: 30px;
            font-size: 22px;
            font-weight: bold;
        }

    </style>
</head>
<body>

<h1>🛍️ Your Shopping Bag</h1>

<div id="bag-items"></div>

<div class="total">
    Total: ₹<span id="total-price">0</span>
</div>

<script>

let bag = JSON.parse(localStorage.getItem("bagItems")) || [];

const container = document.getElementById("bag-items");
const totalPrice = document.getElementById("total-price");

function displayBag() {

    container.innerHTML = "";

    let total = 0;

    bag.forEach((item, index) => {

       total += parseInt(item.price);
container.innerHTML += `

        <div class="bag-card">

            <img src="${item.image}">

            <h3>${item.name}</h3>

            <p>₹${item.price}</p>

            <button class="remove-btn" onclick="removeItem(${index})">
                Remove
            </button>

        </div>
        `;

    });

    totalPrice.textContent = total;
}

function removeItem(index) {

    bag.splice(index, 1);

    localStorage.setItem("bagItems", JSON.stringify(bag));

    displayBag();
    }

displayBag();

</script>

</body>
</html>
