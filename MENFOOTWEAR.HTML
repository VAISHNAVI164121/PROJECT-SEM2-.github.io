<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Men Footwear | Nykaa Fashion</title>
    <link rel="stylesheet" href="MENFOOTWEAR.CSS">
</head>
<body>

<!-- Header -->
<header>
    <div class="logo">NYKAA <span>Fashion</span></div>
    <nav>
        <a href="index.html">Home</a>
        <a href="women.html">Women</a>
        <a href="men.html">Men</a>
        <a href="Makeup.HTML">Makeup</a>
    </nav>
    <div class="bag">
    <a href="bag.html">🛍️ Bag (<span id="bag-count">0</span>)</a>
</div>
</header>

<!-- Page Title -->
<section class="page-title">
    <h1>Men’s Footwear</h1>
    <p>Shoes That Complete Your Look</p>
</section>

<!-- Main Layout -->
<section class="main-container">

    <!-- Products -->
    <div class="products">

        <div class="footwear-card">
            <img src="https://rukminim2.flixcart.com/image/832/832/xif0q/shoe/n/3/o/9-rsl002-red-tape-black-red-original-imagqxvktt8z8zvp.jpeg?q=70" alt="">
            <h3 class="product-name">Casual Sneakers</h3>
            <p class="product-price">2,199</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

        <div class="footwear-card">
            <img src="https://tse3.mm.bing.net/th/id/OIP.rt6OeRPrPvjAtQYGUcBsFQHaHa?cb=ucfimg2&ucfimg=1&rs=1&pid=ImgDetMain&o=7&rm=3" alt="">
            <h3 class="product-name">Running Sports Shoes</h3>
            <p class="product-price">3,499</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

        <div class="footwear-card">
            <img src="https://seeandwear.com/cdn/shop/products/IMG_1195.jpg?v=1703929753&width=1445" alt="">
            <h3 class="product-name">Formal Leather Shoes</h3>
            <p class="product-price">4,999</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

        <div class="footwear-card">
            <img src="https://assets.myntassets.com/h_200,w_200,c_fill,g_auto/h_1440,q_100,w_1080/v1/assets/images/29813182/2024/5/28/624b5dfa-f980-4f2c-b0b9-8ff6a1264cda1716892811239SanFrisscoMenPUComfortSandals1.jpg" alt="">
            <h3 class="product-name">Comfort Sandals</h3>
            <p class="product-price">3,299</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

        <div class="footwear-card">
            <img src="https://www.jiomart.com/images/product/500x630/rvklwrr0jl/arics-man-made-leather-slip-on-loafers-for-men-brown-product-images-rvklwrr0jl-0-202310312302.jpg" alt="">
            <h3 class="product-name">Slip-On Loafers</h3>
            <p class="product-price">5,999</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

        <div class="footwear-card">
            <img src="https://images.puma.com/image/upload/f_auto,q_auto,b_rgb:fafafa,w_750,h_750/global/310282/12/fnd/IND/fmt/png/PWR-Hybrid-Multi-Surface-Grip-Training-Shoes" alt="">
            <h3 class="product-name">Training Shoes</h3>
            <p class="product-price">4,799</p>
            <button class="add-to-bag">Add to Bag</button>
        </div>

    </div>
</section>

<!-- Footer -->
<footer>
    <p>© 2025 Nykaa Fashion Clone | Men Footwear</p>
</footer>
<script>

// Load existing bag items
let bag = JSON.parse(localStorage.getItem("bagItems")) || [];

const bagCount = document.getElementById("bag-count");

// Update bag count
function updateBagCount() {
    bagCount.textContent = bag.length;
}

updateBagCount();
// Add to Bag buttons
const buttons = document.querySelectorAll(".add-to-bag");

buttons.forEach(button => {

    button.addEventListener("click", function() {

        const products = this.parentElement;

        const product = {
            name: products.querySelector(".product-name").innerText,
            price: products.querySelector(".product-price").innerText,
            image: products.querySelector("img").src
        };

        bag.push(product);
        localStorage.setItem("bagItems", JSON.stringify(bag));

        updateBagCount();

        alert("Item added to bag!");
    });

});

</script>

</body>
</html>
