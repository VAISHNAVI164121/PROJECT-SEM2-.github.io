<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Women | Nykaa Fashion</title>
    <link rel="stylesheet" href="men.css">
</head>
<body>

<!-- Header -->
<header>
    <div class="logo">NYKAA <span>Fashion</span></div>
    <nav>
        <a href="index.html">Home</a>
        <a href="women.html">Women</a>
        <a href="men.html">Men</a>
        <a href="Makeup.HTML">Makeup</a>
    </nav>
    <div class="bag">
    <a href="bag.html">🛍️ Bag (<span id="bag-count">0</span>)</a>
</div>
</header>

    <!-- Men Banner -->
    <section class="men-banner">
        <h1>Men’s Fashion</h1>
        <p>Style That Defines You</p>
        <button>Shop Men</button>
    </section>

    <!-- Men Categories -->
    <section class="men-categories">
        <h2>Shop by Category</h2>
        <div class="men-category-container">
            <div class="men-cat"><a href="tshirts.html">T-Shirts</a></div>
            <div class="men-cat"><a href="shirts.html">Shirts</a></div>
            <div class="men-cat"><a href="jeans.html">Jeans</a></div>
            <div class="men-cat"><a href="menkurta.html">kurtas</a></div>
            <div class="men-cat"><a href="MENFOOTWEAR.HTML">Footwear</a></div>
        </div>
    </section>

    <!-- Men Products -->
    <section class="men-products">
        <h2>Trending for Men</h2>
        <div class="men-product-grid">

            <div class="men-card">
                <img src="https://levi.in/cdn/shop/files/A79000050_01_Elevated.jpg?v=1760011129&width=11" alt="">
                <h3 class="product-name">Casual T-Shirt</h3>
                <p class="product-price">999</p>
                <button class="add-to-bag">Add to Bag</button>
            </div>

            <div class="men-card">
                <img src="https://media-us.landmarkshops.in/cdn-cgi/image/h=831,w=615,q=85,fit=cover/max-new/1000013446420-Grey-GREY-1000013446420_01-2100.jpg" alt="">
                <h3 class="product-name">Formal Shirt</h3>
                <p class="product-price">2499</p>
                <button class="add-to-bag">Add to Bag</button>
            </div>

            <div class="men-card">
                <img src="https://levi.in/cdn/shop/files/001H90131_01_Styleshot.jpg?v=1754232771&width=118" alt="">
                <h3 class="product-name">Denim Jeans</h3>
                <p class="product-price">3999</p>
                <button class="add-to-bag">Add to Bag</button>
            </div>

            <div class="men-card">
                <img src="https://i.etsystatic.com/29168401/r/il/4cfa51/3021278730/il_1588xN.3021278730_ilg6.jpg" alt="">
                <h3 class="product-name">Ethnic Kurta</h3>
                <p class="product-price">6299</p>
                <button class="add-to-bag">Add to Bag</button>
            </div>

        </div>
    </section>
    <script>

// Load existing bag items
let bag = JSON.parse(localStorage.getItem("bagItems")) || [];

const bagCount = document.getElementById("bag-count");

// Update bag count
function updateBagCount() {
    bagCount.textContent = bag.length;
}

updateBagCount();
// Add to Bag buttons
const buttons = document.querySelectorAll(".add-to-bag");

buttons.forEach(button => {

    button.addEventListener("click", function() {

        const products = this.parentElement;

        const product = {
            name: products.querySelector(".product-name").innerText,
            price: products.querySelector(".product-price").innerText,
            image: products.querySelector("img").src
        };

        bag.push(product);
        localStorage.setItem("bagItems", JSON.stringify(bag));

        updateBagCount();

        alert("Item added to bag!");
    });

});

</script>


</body>
</html>
